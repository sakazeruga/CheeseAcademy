<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Mentor — 職人の第二の脳。| Cheese Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=JetBrains+Mono&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>

    --bordeaux:#4A0404;--bordeaux-2:#6B0F0F;--amber:#D4A017;--amber-2:#B58410;
    --ink:#1A1410;--ink-2:#3A3028;--mute:#8A7E6C;--rule:#C9BFA6;--rule-soft:#E6DFCA;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--parchment);color:var(--ink);font-family:"Noto Sans JP",system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-feature-settings:"palt";}
  .serif{font-family:"Cormorant Garamond",serif;font-weight:400;letter-spacing:.01em}
  .serif-jp{font-family:"Noto Serif JP",serif;font-weight:400}
  .mono{font-family:"JetBrains Mono",monospace;letter-spacing:.04em}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.35;mix-blend-mode:multiply;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .55 0 0 0 0 .5 0 0 0 0 .4 0 0 0 .06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
</style>
<script src="js/react.development.js"></script>
<script src="js/react-dom.development.js"></script>
<script src="js/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const btnFilled = { background:"var(--bordeaux)",color:"var(--parchment)",border:"none",padding:"11px 20px",fontSize:12,letterSpacing:".12em",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontWeight:500 };
const btnGhost  = { background:"transparent",color:"var(--ink)",border:"1px solid var(--ink)",padding:"10px 18px",fontSize:12,letterSpacing:".12em",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontWeight:500 };

const SectionMark = ({ n, label }) =>
  <div className="mono" style={{ fontSize:11,letterSpacing:".24em",textTransform:"uppercase",color:"var(--bordeaux)",display:"flex",alignItems:"center",gap:14 }}>
    <span style={{ fontWeight:500 }}>§{n}</span>
    <span style={{ width:28,height:1,background:"var(--bordeaux)",opacity:.5 }} />
    <span style={{ color:"var(--ink-2)" }}>{label}</span>
  </div>;

function Logo({ dark = false }) {
  return (
    <a href="index.html" style={{ textDecoration:"none",display:"flex",alignItems:"center",gap:12 }}>
      <div style={{ width:40,height:40,border:"1px solid "+(dark?"rgba(253,253,245,.5)":"var(--ink)"),display:"grid",placeItems:"center",fontFamily:"Cormorant Garamond, serif",fontSize:26,fontWeight:500,color:dark?"var(--parchment)":"var(--ink)" }}>C</div>
      <div style={{ lineHeight:1.1 }}>
        <div className="serif" style={{ fontSize:18,letterSpacing:".02em",color:dark?"var(--parchment)":"var(--ink)" }}>Cheese Academy</div>
        <div className="mono" style={{ fontSize:9,letterSpacing:".28em",color:dark?"rgba(253,253,245,.6)":"var(--mute)" }}>TOKYO · TERROIR · TECH</div>
      </div>
    </a>
  );
}

function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const on = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", on); on();
    return () => window.removeEventListener("scroll", on);
  }, []);
  const links = [["§01","Market","index.html#s01"],["§02","Pillars","index.html#s02"],["§03","For You","index.html#s03"],["§04","AI Mentor","index.html#s04"],["§05","Journal","index.html#s05"]];
  return (
    <div style={{ position:"fixed",top:0,left:0,right:0,zIndex:50,transition:"all .35s ease",background:scrolled?"rgba(253,253,245,.92)":"transparent",backdropFilter:scrolled?"blur(10px)":"none",borderBottom:scrolled?"1px solid var(--rule-soft)":"1px solid transparent" }}>
      <div style={{ maxWidth:1440,margin:"0 auto",padding:"18px 48px",display:"flex",alignItems:"center",justifyContent:"space-between" }}>
        <Logo />
        <nav style={{ display:"flex",gap:36,alignItems:"center" }}>
          {links.map(([k,l,href]) =>
            <a key={l} href={href} style={{ textDecoration:"none",color:"var(--ink-2)",fontSize:13,display:"flex",gap:8,alignItems:"baseline" }}>
              <span className="mono" style={{ fontSize:10,color:"var(--bordeaux)",opacity:.7 }}>{k}</span>
              <span>{l}</span>
            </a>
          )}
        </nav>
        <div style={{ display:"flex",gap:10 }}>
          <button style={btnGhost}>ログイン</button>
          <button style={btnFilled}>無料で試す →</button>
        </div>
      </div>
    </div>
  );
}

function Hero() {
  return (
    <section style={{ minHeight:"80vh",padding:"160px 48px 120px",background:"linear-gradient(180deg,var(--parchment) 0%,var(--parchment-2) 100%)",position:"relative",overflow:"hidden" }}>

      <div style={{ maxWidth:1440,margin:"0 auto",position:"relative" }}>
        <div className="mono" style={{ fontSize:10,letterSpacing:".22em",color:"var(--mute)",marginBottom:52,display:"flex",gap:12,alignItems:"center" }}>

          <span style={{ color:"var(--bordeaux)" }}>PILLAR · III — SAAS</span>
        </div>
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:80,alignItems:"center" }}>
          <div>
            <div className="mono" style={{ fontSize:11,letterSpacing:".36em",color:"var(--bordeaux)",marginBottom:24,display:"flex",gap:14,alignItems:"center" }}>
              <span style={{ display:"inline-block",width:8,height:8,border:"1px solid var(--bordeaux)",transform:"rotate(45deg)" }} />
              <span>育てる。</span>
            </div>
            <h1 className="serif-jp" style={{ margin:0,fontSize:"clamp(48px,5.5vw,88px)",lineHeight:1.1,fontWeight:400,letterSpacing:".01em",color:"var(--ink)" }}>
              職人の<br />
              <span style={{ fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",color:"var(--bordeaux)",fontWeight:500 }}>第二の脳。</span>
            </h1>
            <p style={{ marginTop:36,fontSize:17,lineHeight:1.9,color:"var(--ink-2)",maxWidth:520 }}>
              廃業理由1位の「ビジネス経験不足」を、AIが24時間伴走して解決。原価最適化から販路診断・財務レポートまで、経営判断をデータで支えます。
            </p>
            <div style={{ marginTop:40,display:"flex",gap:16 }}>
              <button style={{ ...btnFilled,padding:"16px 28px",fontSize:13 }}>無料で試す →</button>
              <button style={{ ...btnGhost,padding:"15px 26px",fontSize:13 }}>機能を詳しく見る</button>
            </div>
          </div>
          <div>
            <div style={{ position:"relative",height:280,overflow:"hidden" }}>
              <img src="assets/Gemini_Generated_Image_fok3axfok3axfok3.png" alt="Artisan with 24h AI Mentor" style={{ width:"100%",height:"100%",objectFit:"cover",objectPosition:"center",display:"block",filter:"sepia(0.28) saturate(0.62) brightness(0.88) contrast(1.06)" }} />
              <div style={{ position:"absolute",inset:0,background:"rgba(74,4,4,.18)",mixBlendMode:"multiply",pointerEvents:"none" }} />
              <div style={{ position:"absolute",inset:0,background:"linear-gradient(180deg,transparent 55%,rgba(26,20,16,.45))",pointerEvents:"none" }} />
              <div style={{ position:"absolute",bottom:16,left:16,background:"var(--parchment)",padding:"6px 12px",border:"1px solid var(--bordeaux)" }}>
                <div className="mono" style={{ fontSize:9,letterSpacing:".22em",color:"var(--bordeaux)" }}>SCENE.N°001 · SECOND BRAIN</div>
              </div>
            </div>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:0,borderTop:"1px solid var(--ink)",borderLeft:"1px solid var(--ink)" }}>
              {[["67%","廃業理由：経営経験不足"],["24h","AI伴走サポート"],["94%","財務予測精度"],["−32%","平均原価削減実績"]].map(([n,l],i) =>
                <div key={i} style={{ padding:"28px 28px",borderRight:"1px solid var(--ink)",borderBottom:"1px solid var(--ink)" }}>
                  <div className="serif" style={{ fontSize:42,color:"var(--bordeaux)",fontWeight:500,fontStyle:"italic",lineHeight:1 }}>{n}</div>
                  <div style={{ fontSize:11,letterSpacing:".14em",color:"var(--mute)",marginTop:8 }}>{l}</div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function Problem() {
  return (
    <section style={{ padding:"140px 48px 120px",background:"var(--parchment)" }}>
      <div style={{ maxWidth:1440,margin:"0 auto" }}>
        <div style={{ display:"grid",gridTemplateColumns:"1fr 2fr",gap:80,marginBottom:80,alignItems:"end" }}>
          <SectionMark n="01" label="The Problem" />
          <h2 className="serif-jp" style={{ margin:0,fontSize:"clamp(40px,4.2vw,64px)",lineHeight:1.25,fontWeight:400 }}>
            技術は世界一でも、<br />
            <span style={{ fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",color:"var(--bordeaux)" }}>経営で倒れる。</span>
          </h2>
        </div>
        <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:0,borderTop:"1px solid var(--ink)" }}>
          {[
            { stat:"67%",label:"廃業理由の第1位",headline:"ビジネス経験不足",body:"農水省調査によると、六次産業化事業者の廃業理由の67%が「経営・マーケティング経験の不足」。技術の高さは廃業を防げない。",src:"農水省・六次産業化調査, 2024" },
            { stat:"3.2年",label:"平均存続年数",headline:"資金繰り悪化が最大の壁",body:"クラフトチーズ工房の平均存続年数は3.2年。その多くが原価管理の失敗と販路開拓の停滞による資金ショートが原因とされる。",src:"食品産業センター, 2025" },
            { stat:"0件",label:"専門的デジタルツール",headline:"業界特化の支援がない",body:"欧米ではチーズ・乳製品に特化した経営SaaSが20社以上存在する。日本市場でこの領域を本格的に扱うプロダクトは現時点でゼロ。",src:"Internal audit, 2026" },
          ].map((s,i) => {
            const [hover, setHover] = useState(false);
            return (
              <div key={i} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
                style={{ padding:"44px 40px 48px",borderRight:i<2?"1px solid var(--rule)":"none",borderBottom:"1px solid var(--ink)",background:hover?"var(--cream-soft)":"transparent",transition:"background .35s",cursor:"default" }}>
                <div className="serif" style={{ fontSize:88,lineHeight:1,fontWeight:500,color:hover?"var(--bordeaux)":"var(--ink)",fontStyle:hover?"italic":"normal",transition:"all .35s cubic-bezier(.2,.7,.2,1)" }}>{s.stat}</div>
                <div style={{ fontSize:11,letterSpacing:".14em",color:"var(--mute)",marginTop:4 }}>{s.label}</div>
                <h3 className="serif-jp" style={{ marginTop:24,marginBottom:14,fontSize:22,fontWeight:500,lineHeight:1.5,color:"var(--ink)" }}>{s.headline}</h3>
                <p style={{ margin:0,fontSize:14,lineHeight:1.85,color:"var(--ink-2)" }}>{s.body}</p>
                <div style={{ marginTop:32 }}>
                  <div className="mono" style={{ fontSize:10,color:"var(--mute)",letterSpacing:".14em" }}>— {s.src}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

function Features() {
  const [active, setActive] = useState(0);
  const features = [
    {
      k:"COST · OPT",
      title:"原価最適化",
      jp:"利益を、数値で見る。",
      desc:"材料費・労働費・設備費・光熱費をリアルタイムで分析。季節変動・廃棄ロスを考慮した実態原価を自動算出し、価格設定の根拠を提供します。",
      points:["SKU別原価の自動計算","廃棄ロス率の可視化","価格改定シミュレーター","競合価格モニタリング"],
      metric:{ label:"平均原価削減", value:"−32%" },
    },
    {
      k:"SALES · DIAG",
      title:"販路診断",
      jp:"売り先を、データで選ぶ。",
      desc:"現在の販路の収益性・成長性・リスクを評価。ECサイト・地方百貨店・飲食店・ブルワリーなど、あなたに最適な次の販路を提案します。",
      points:["販路別収益性ランキング","新規チャネル開拓提案","顧客LTV分析","地域需要ヒートマップ"],
      metric:{ label:"新規販路獲得", value:"+2.4件/月" },
    },
    {
      k:"FINANCE · AUTO",
      title:"財務レポート自動化",
      jp:"月次報告を、AIに任せる。",
      desc:"売上・原価・在庫・キャッシュフローをAIが自動集計し、月次レポートを生成します。補助金申請書類のドラフト作成にも対応します。",
      points:["月次PL自動生成","キャッシュフロー予測","補助金申請ドラフト","税理士連携エクスポート"],
      metric:{ label:"レポート作成時間", value:"−18h/月" },

  ];
  const f = features[active];
  return (
    <section style={{ padding:"140px 0 120px",background:"var(--parchment-2)" }}>
      <div style={{ maxWidth:1440,margin:"0 auto",padding:"0 48px" }}>
        <div style={{ display:"grid",gridTemplateColumns:"1fr 2fr",gap:80,marginBottom:60,alignItems:"end" }}>
          <SectionMark n="02" label="Features" />
          <h2 className="serif-jp" style={{ margin:0,fontSize:"clamp(40px,4.2vw,64px)",lineHeight:1.25,fontWeight:400 }}>
            3つの機能が、<br />

          </h2>
        </div>
        <div style={{ display:"flex",gap:0,borderBottom:"1px solid var(--rule)",marginBottom:60 }}>
          {features.map((x,i) =>
            <button key={i} onClick={() => setActive(i)}
              style={{ background:"transparent",border:"none",cursor:"pointer",padding:"20px 36px 20px 0",marginRight:32,color:i===active?"var(--bordeaux)":"var(--mute)",fontSize:13,letterSpacing:".14em",position:"relative",fontFamily:"'JetBrains Mono',monospace",transition:"color .25s" }}>
              <span className="mono">0{i+1} · {x.k}</span>
              {i===active && <div style={{ position:"absolute",bottom:-1,left:0,right:32,height:2,background:"var(--bordeaux)" }} />}
            </button>
          )}
        </div>
        <div key={active} style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:72,animation:"fadeUp .5s ease" }}>
          <style>{"@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}"}</style>
          <div style={{ display:"flex",flexDirection:"column",justifyContent:"center" }}>
            <div className="mono" style={{ fontSize:10,letterSpacing:".26em",color:"var(--bordeaux)",marginBottom:20 }}>{f.k}</div>
            <div className="serif-jp" style={{ fontSize:20,color:"var(--amber-2)",fontWeight:400,marginBottom:8 }}>{f.jp}</div>
            <h3 className="serif" style={{ margin:"0 0 0",fontSize:52,fontWeight:500,fontStyle:"italic",color:"var(--ink)" }}>{f.title}</h3>
            <div style={{ width:64,height:1,background:"var(--bordeaux)",margin:"28px 0" }} />
            <p style={{ margin:0,fontSize:16,lineHeight:1.95,color:"var(--ink-2)",maxWidth:480 }}>{f.desc}</p>
            <ul style={{ listStyle:"none",padding:0,margin:"32px 0 0",display:"flex",flexDirection:"column",gap:14 }}>
              {f.points.map((pt,j) =>
                <li key={j} style={{ display:"flex",gap:16,alignItems:"baseline",fontSize:14,color:"var(--ink)" }}>
                  <span className="mono" style={{ fontSize:10,color:"var(--amber-2)",letterSpacing:".18em",minWidth:28 }}>0{j+1}</span>
                  <span style={{ flex:1,paddingBottom:10,borderBottom:"1px dashed var(--rule)" }}>{pt}</span>
                </li>
              )}
            </ul>
            <div style={{ marginTop:32,display:"inline-flex",gap:16,padding:"20px 24px",background:"var(--cream-soft)",borderLeft:"3px solid var(--amber)" }}>
              <div>
                <div className="mono" style={{ fontSize:9,letterSpacing:".22em",color:"var(--mute)" }}>{f.metric.label}</div>
                <div className="serif" style={{ fontSize:36,color:"var(--bordeaux)",fontStyle:"italic",fontWeight:500,marginTop:4 }}>{f.metric.value}</div>
              </div>
            </div>
          </div>
          <div style={{ display:"flex",flexDirection:"column",gap:0 }}>
            <div style={{ background:"var(--ink)",padding:"0",display:"flex",flexDirection:"column" }}>
              <MentorChat feature={active} />
            </div>
            <div style={{ position:"relative",height:300,overflow:"hidden" }}>
              <img src="assets/Gemini_Generated_Image_s2yvl4s2yvl4s2yv.png" alt="Cheese Academy AI Mentor — actual production cost app" style={{ width:"100%",height:"100%",objectFit:"cover",objectPosition:"center 30%",display:"block",filter:"sepia(0.28) saturate(0.62) brightness(0.88) contrast(1.06)" }} />
              <div style={{ position:"absolute",inset:0,background:"rgba(74,4,4,.12)",mixBlendMode:"multiply",pointerEvents:"none" }} />
              <div style={{ position:"absolute",inset:0,background:"linear-gradient(180deg,transparent 50%,rgba(26,20,16,.4) 100%)",pointerEvents:"none" }} />
              <div style={{ position:"absolute",bottom:16,right:16,background:"var(--parchment)",padding:"6px 12px",border:"1px solid var(--bordeaux)" }}>
                <div className="mono" style={{ fontSize:9,letterSpacing:".22em",color:"var(--bordeaux)" }}>SCENE.N°002 · COST APP</div>
              </div>
            </div>
          </div>
        </div>

function MentorChat({ feature }) {

    [
      { from:"artisan", name:"田中 チーズ工房", msg:"今月のゴーダの製造原価、計算してほしい。牛乳代が先月より上がったから不安で。" },

      { from:"artisan", name:"田中 チーズ工房", msg:"今の卸値だと赤字になりそう…どうすれば？" },

        </div>
        <div className="mono" style={{ fontSize:10,letterSpacing:".18em",color:"rgba(253,253,245,.5)" }}>SESSION · #0{feature+1}01</div>
