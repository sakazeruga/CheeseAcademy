function Algorithm() {
  const [score, setScore] = useState(84);

      setScore(s => Math.max(60, Math.min(98, s + (Math.random() * 8 - 4))));
      setBars(b => b.map(x => Math.max(30, Math.min(99, x + (Math.random() * 12 - 6)))));
    }, 2200);
    return () => clearInterval(id);
